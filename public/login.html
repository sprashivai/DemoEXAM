<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Конференции.РФ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Конференции.РФ</h1>
            <p>Всероссийская платформа для бронирования помещений</p>
        </div>
        
        <div class="nav">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="login.html" class="nav-link active">Вход</a>
            <a href="register.html" class="nav-link">Регистрация</a>
            <a href="profile.html" class="nav-link">Личный кабинет</a>
            <a href="booking.html" class="nav-link">Бронирование</a>
            <a href="admin.html" class="nav-link">Админ панель</a>
            <button id="logoutBtn" class="logout-btn" style="display:none;">Выход</button>
        </div>
        
        <div class="content">
            <div class="form-card">
                <h2>Вход в систему</h2>
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" id="loginInput" placeholder="Введите логин">
                    <span class="error-hint" id="loginError"></span>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="passwordInput" placeholder="Введите пароль">
                    <span class="error-hint" id="passwordError"></span>
                </div>
                <button id="loginBtn" class="btn-primary">Войти</button>
                <div class="auth-link">
                    <a href="register.html">Еще не зарегистрированы? Регистрация</a>
                </div>
                <div id="loginMessage" class="message"></div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
